apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel
  template:
    metadata:
      labels:
        app: hotel
    spec:
      containers:
      - name: hotel-container
        image: 23mis0539/hotel-booking
        ports:
        - containerPort: 8085
